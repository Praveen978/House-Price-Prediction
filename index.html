<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>House Price Predictor</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #f8f9fa; 
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            max-width: 550px;
            width: 100%;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 35px;
        }
        form {
            text-align: left;           /* ← This makes labels and inputs left-aligned */
        }
        label {
            display: block;
            margin: 20px 0 8px;
            font-weight: bold;
            color: #34495e;
        }
        input[type="number"],
        select {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #d1d9e0;
            border-radius: 8px;
            box-sizing: border-box;
        }
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.15);
        }
        button {
            margin-top: 35px;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #219653;
        }
        .result {
            margin-top: 40px;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 10px;
            border-left: 5px solid #27ae60;
            font-size: 26px;
            font-weight: bold;
            color: #1b5e20;
            text-align: center;
        }
        .error {
            margin-top: 25px;
            padding: 15px;
            background: #ffebee;
            border-radius: 8px;
            color: #c62828;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏠 House Price Predictor</h1>

        <form method="POST">
            <label>Area (sqft):</label>
            <input type="number" name="area" min="100" required placeholder="e.g. 1200">

            <label>Bedrooms:</label>
            <input type="number" name="bedrooms" min="1" max="10" required placeholder="e.g. 3">

            <label>Bathrooms:</label>
            <input type="number" name="bathrooms" min="1" max="6" required placeholder="e.g. 2">

            <label>Age (years):</label>
            <input type="number" name="age" min="0" required placeholder="e.g. 5">

            <label>Location:</label>
            <select name="location" required>
                <option value="">Select Location</option>
                <option value="Rural">Rural</option>
                <option value="Suburb">Suburb</option>
                <option value="City Center">City Center</option>
            </select>

            <label>Property Type:</label>
            <select name="property_type" required>
                <option value="">Select Type</option>
                <option value="House">House</option>
                <option value="Villa">Villa</option>
                <option value="Apartment">Apartment</option>
            </select>

            <button type="submit">Predict Price</button>
        </form>

        {% if prediction %}
            <div class="result">
                Estimated Price: {{ prediction }}
            </div>
        {% endif %}

        {% if error %}
            <div class="error">
                {{ error }}
            </div>
        {% endif %}
    </div>

</body>
</html>
